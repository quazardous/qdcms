# sandbox/traefik/dynamic.yaml — dynamic config.
#
# File-based provider for things the docker provider can't
# express. Today : the default TLS certificate for the
# websecure entrypoint.

tls:
  # Default cert + key for any HTTPS request. Generated by
  # `make certs` in the sandbox dir using mkcert (auto-trusted
  # in the local browser via the mkcert root CA — no certificate
  # warnings). Empty `traefik/certs/` until that runs ; Traefik
  # falls back to its built-in self-signed cert (browser warn).
  certificates:
    - certFile: /etc/traefik/certs/dev.crt
      keyFile: /etc/traefik/certs/dev.key
