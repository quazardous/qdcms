# sandbox/traefik/traefik.yaml — static config.
#
# Inspired by the m2m sandbox pattern. Single Traefik instance
# routes container traffic by docker labels ; the qdcms sandbox
# uses it to expose the demo on multiple subdomains
# (demo-frontend.qdcms.localhost, demo-backend.qdcms.localhost,
# etc.) — useful for testing auth flows that care about cookie
# domains, multi-tenant scenarios, OAuth redirect URLs.
#
# HTTP-only by default ; the user can add TLS by mounting certs
# at /etc/certs and uncommenting the websecure entryPoint.

global:
  sendAnonymousUsage: false

# Dashboard at http://traefik.qdcms.localhost (insecure: dev only).
api:
  dashboard: true
  insecure: true

providers:
  docker:
    endpoint: 'unix:///var/run/docker.sock'
    watch: true
    # Only pick up containers we explicitly opt-in via
    # traefik.enable=true. Keeps unrelated containers off the
    # router (we share the docker daemon with the host's other
    # projects).
    exposedByDefault: false
    network: sandbox_traefik
    # Constraint so a host running multiple traefik dev sandboxes
    # for different projects doesn't cross-route.
    constraints: 'Label(`dev.project`, `qdcms-sandbox`)'

  file:
    filename: /etc/traefik/dynamic.yaml
    watch: true

log:
  level: INFO
  format: common

accessLog: {}

entryPoints:
  web:
    address: ':80'

  # HTTPS entrypoint. Cert + key are loaded from
  # /etc/traefik/certs/ (mounted from sandbox/traefik/certs/).
  # The dynamic config (dynamic.yaml) declares the default
  # certificate.
  websecure:
    address: ':443'
