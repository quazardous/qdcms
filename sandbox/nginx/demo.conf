# sandbox/nginx/demo.conf — nginx vhost for the demo's prod-like
# topology rehearsal. Mirrors docs/deploy.md §4 minus the TLS
# bits (sandbox is HTTP-only ; Traefik handles TLS termination
# at its own entrypoint when wired).
#
# Mounted at /etc/nginx/conf.d/default.conf inside the nginx
# container. The instance lives at /demo (volume from the host
# repo). The backend reaches us at the docker DNS name `qdcms`
# (the service name in docker-compose).

server {
  listen 80 default_server;
  server_name _;

  root /demo/frontend/dist;
  index index.html;

  # Reasonable defaults for a real production rehearsal.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # ─── 1. API → qdcms backend (the qdcms service, port 5181) ─
  location /api/qdcms/ {
    proxy_pass http://qdcms:5181;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }

  # ─── 2. Static assets at the URL root (umbrella public/) ───
  # Files in /demo/public/ end up at /<file> via these aliases.
  # Keep the list aligned with what's actually in public/ ;
  # `try_files` handles the rest as 404.
  location = /favicon.ico { root /demo/public; access_log off; }
  location = /robots.txt  { root /demo/public; access_log off; }
  location = /sitemap.xml { root /demo/public; access_log off; }

  # ─── 3. SPA bundle + client-side router fallback ───────────
  # Long-lived cache on hashed assets — `immutable` because Vite
  # hashes filenames per content.
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Forward Vite's HMR websocket upstream when a sandbox user
  # really wants live reload through nginx (rare — direct port
  # 5180 is faster). Off by default ; uncomment to wire :
  # location /@vite/ {
  #   proxy_pass http://qdcms:5180;
  #   proxy_http_version 1.1;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection "upgrade";
  # }

  access_log /var/log/nginx/demo.access.log;
  error_log  /var/log/nginx/demo.error.log;
}
