# sandbox/docker-compose.yml — qdcms reproducible env.
#
# Volume principle : code is SHARED with the host (mounted), state
# is ISOLATED (sandbox-specific). The two worlds from structure.md
# materialise as two distinct mount points :
#
#  - /core   = the qdcms repo (framework, packages, tooling)
#  - /demo   = the demo instance (its own world, pointed at /demo)
#  - /qdadm  = sibling qdadm repo (file: workspace deps target)
#
# Isolated state — host stays untouched even with the sandbox
# running :
#  - /demo/data       ← bound from sandbox/demo/data
#  - /demo/.compiled  ← bound from sandbox/demo/.compiled
#
# Multi-domain routing via Traefik. Two topologies tested side
# by side :
#
#  Direct (Vite dev / Express) :
#    demo-frontend.qdcms.localhost  →  qdcms:5180
#    demo-backend.qdcms.localhost   →  qdcms:5181
#
#  nginx (prod-like — serves dist/ + proxies /api → backend) :
#    demo.nginx.qdcms.localhost     →  nginx:80 → qdcms:5181 (api)
#                                                + /demo/frontend/dist (static)
#
#  Traefik dashboard :
#    traefik.qdcms.localhost        →  Traefik
#
# Plus the legacy direct ports (5180/5181) for non-domain access.
#
# Future hook : a config overlay (sandbox-specific YAML
# overriding the demo's config) would slot in here as additional
# bind mounts at /demo/config/<file>.yaml. Defer until needed.
#
# node_modules live in named docker volumes — never share host's,
# because native modules (better-sqlite3) compile per arch.

services:
  qdcms:
    build:
      context: .
      dockerfile: Dockerfile
    image: qdcms-sandbox:dev
    container_name: qdcms-sandbox
    volumes:
      - ../core:/core
      - ../../qdadm:/qdadm
      - ../demo:/demo
      - ./demo/data:/demo/data
      - ./demo/.compiled:/demo/.compiled
      - qdcms-node-modules-core:/core/node_modules
      - qdcms-node-modules-demo:/demo/node_modules
      - qdadm-node-modules:/qdadm/node_modules
    working_dir: /core
    # Direct port mapping kept for non-Traefik access (curl, CI).
    ports:
      - '${SANDBOX_FRONTEND_PORT:-5180}:5180'
      - '${SANDBOX_BACKEND_PORT:-5181}:5181'
    environment:
      - NODE_ENV=development
      - QDCMS_CORE=/core
    command: ['tail', '-f', '/dev/null']
    networks:
      - default
      - traefik
    labels:
      - traefik.enable=true
      - dev.project=qdcms-sandbox
      # Frontend route (Vite dev server on port 5180 in-container).
      - traefik.http.routers.qdcms-sandbox-frontend.rule=Host(`demo-frontend.qdcms.localhost`)
      - traefik.http.routers.qdcms-sandbox-frontend.entrypoints=web
      - traefik.http.routers.qdcms-sandbox-frontend.service=qdcms-sandbox-frontend
      - traefik.http.services.qdcms-sandbox-frontend.loadbalancer.server.port=5180
      # Backend route (Express on port 5181 in-container).
      - traefik.http.routers.qdcms-sandbox-backend.rule=Host(`demo-backend.qdcms.localhost`)
      - traefik.http.routers.qdcms-sandbox-backend.entrypoints=web
      - traefik.http.routers.qdcms-sandbox-backend.service=qdcms-sandbox-backend
      - traefik.http.services.qdcms-sandbox-backend.loadbalancer.server.port=5181

  # nginx — prod-like topology. Serves the SPA's dist/ statically
  # and reverse-proxies /api/qdcms/* to the qdcms backend service.
  # Build the dist first (`make build` in the sandbox) before
  # this is meaningful ; nginx will 404 on / until then.
  nginx:
    image: nginx:1.27-alpine
    container_name: qdcms-sandbox-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/demo.conf:/etc/nginx/conf.d/default.conf:ro
      # Read-only mount of the instance — nginx serves dist/ and
      # public/ from here, never writes back.
      - ../demo:/demo:ro
    networks:
      - default
      - traefik
    depends_on:
      - qdcms
    labels:
      - traefik.enable=true
      - dev.project=qdcms-sandbox
      # Domain pattern : *.nginx.qdcms.localhost — the `.nginx.`
      # basename makes the topology obvious from the URL.
      - traefik.http.routers.qdcms-sandbox-nginx.rule=Host(`demo.nginx.qdcms.localhost`)
      - traefik.http.routers.qdcms-sandbox-nginx.entrypoints=web
      - traefik.http.services.qdcms-sandbox-nginx.loadbalancer.server.port=80

  traefik:
    image: traefik:v3.6
    container_name: qdcms-sandbox-traefik
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./traefik/dynamic.yaml:/etc/traefik/dynamic.yaml:ro
    ports:
      - '${SANDBOX_HTTP_PORT:-80}:80'
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - dev.project=qdcms-sandbox
      # Dashboard at http://traefik.qdcms.localhost
      - traefik.http.routers.qdcms-sandbox-dashboard.rule=Host(`traefik.qdcms.localhost`)
      - traefik.http.routers.qdcms-sandbox-dashboard.entrypoints=web
      - traefik.http.routers.qdcms-sandbox-dashboard.service=api@internal

volumes:
  qdcms-node-modules-core:
  qdcms-node-modules-demo:
  qdadm-node-modules:

networks:
  default:
    name: sandbox_default
  traefik:
    name: sandbox_traefik
    driver: bridge
